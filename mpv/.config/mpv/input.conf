
# mpv keybindings

SPACE cycle pause
f cycle fullscreen
Esc quit-watch-later
q quit-watch-later

l seek 7 exact
h seek -7 exact
k add volume 2
j add volume -2

Shift+l add sub-scale +0.1
Shift+h add sub-scale -0.1
Shift+k add sub-pos -1
Shift+j add sub-pos +1

Ctrl+l playlist-next
Ctrl+h playlist-prev
Ctrl+k multiply speed 1.1
Ctrl+j multiply speed 1/1.1

Alt+l add sub-delay +0.1 
Alt+h add sub-delay -0.1            
Alt+k add audio-delay 0.100
Alt+j add audio-delay -0.100

s cycle sub-visibility
Ctrl+s cycle sub

Ctrl+a cycle audio
a cycle mute

Ctrl+r seek 0 absolute
p show-progress
i script-binding stats/display-stats-toggle
o show-text ${playlist}

x add brightness 1
z add brightness -1
